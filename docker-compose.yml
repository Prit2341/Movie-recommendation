services:
  db:
    image: postgres:17
    container_name: db
    environment:
      POSTGRES_USER: imdb
      POSTGRES_PASSWORD: imdb
      POSTGRES_DB: imdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./data_dump.sql:/docker-entrypoint-initdb.d/02_data_dump.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -h 127.0.0.1 -U imdb -d imdb -c 'SELECT 1 FROM movies LIMIT 1'"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s

  model:
    build:
      context: .
      dockerfile: model/Dockerfile
    container_name: model-trainer
    environment:
      DATABASE_URL: postgresql://imdb:imdb@db:5432/imdb
    volumes:
      - model_artifacts:/app/model/models
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    environment:
      DATABASE_URL: postgresql://imdb:imdb@db:5432/imdb
    volumes:
      - model_artifacts:/app/model/models
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      model:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  model_artifacts:
